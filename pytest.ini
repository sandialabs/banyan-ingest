# pytest configuration for banyan-extract

[pytest]
# Configuration for pytest

# Test discovery
python_files = test_*.py example_*.py
python_functions = test_*
python_classes = Test*

# Test paths
testpaths = tests

# Output formatting
addopts = --tb=short

# Markers for different test types
markers =
    unit: mark a test as a unit test
    integration: mark a test as an integration test
    example: mark a test as an example-based test
    slow: mark a test as slow
    external: mark a test that requires external services
    meta: mark a test as a meta-test (tests about tests)

# Python path configuration
pythonpath = src

# Disable warnings for cleaner output
filterwarnings =
    ignore::DeprecationWarning
